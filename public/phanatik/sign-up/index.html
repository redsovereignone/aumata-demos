  document.addEventListener("DOMContentLoaded", function () {
    document.querySelectorAll("#tab-section").forEach((tabSection) => {
      // Select all the tab links inside the current #tab-section
      const tabs = tabSection.querySelectorAll("button");
      // Select all the tab content sections within the current #tab-section
      const tabContents = tabSection.querySelectorAll(".tab-content");

      if (tabs.length > 0 && tabContents.length > 0) {
        // Set the first tab as active and its content visible by default
        tabs[0].classList.add("text-black", "border-b-2", "border-base-500");
        tabContents[0].classList.remove("hidden"); // Show the first tab content by default
      }

      // Add a click event listener to each tab link
      tabs.forEach((tab) => {
        tab.addEventListener("click", function (e) {
          e.preventDefault();

          // Remove the active class from all tabs in this section
          tabs.forEach((t) =>
            t.classList.remove("border-b-2", "border-base-500", "text-black")
          );
          // Add the active class to the clicked tab
          tab.classList.add("text-black", "border-b-2", "border-base-500");

          // Hide all tab contents in this section
          tabContents.forEach((content) => content.classList.add("hidden"));

          // Show the corresponding content in this section
          const targetTab = tab.getAttribute("data-tab");
          tabSection.querySelector(`#${targetTab}`).classList.remove("hidden");
        });
      });
    });
  });

  document.addEventListener("DOMContentLoaded", () => {
    const playPauseBtn = document.getElementById("playPauseBtn");
    const audioElement = document.getElementById("audioElement");
    const seekBar = document.getElementById("seekBar");
    const muteBtn = document.getElementById("muteBtn");
    const backwardBtn = document.getElementById("backwardBtn");
    const forwardBtn = document.getElementById("forwardBtn");
    const currentTimeDisplay = document.getElementById("currentTime");
    const durationDisplay = document.getElementById("duration");

    // Icons inside the buttons
    const playIcon = document.getElementById("playIcon");
    const pauseIcon = document.getElementById("pauseIcon");
    const speakerIcon = document.getElementById("speakerIcon");
    const muteIcon = document.getElementById("muteIcon");

    // Play/Pause toggle
    playPauseBtn.addEventListener("click", () => {
      if (audioElement.paused) {
        audioElement.play();
        playIcon.classList.add("hidden");
        pauseIcon.classList.remove("hidden");
      } else {
        audioElement.pause();
        pauseIcon.classList.add("hidden");
        playIcon.classList.remove("hidden");
      }
    });

    // Mute/Unmute toggle
    muteBtn.addEventListener("click", () => {
      audioElement.muted = !audioElement.muted;
      speakerIcon.classList.toggle("hidden", audioElement.muted);
      muteIcon.classList.toggle("hidden", !audioElement.muted);
    });

    // Backward 10s
    backwardBtn.addEventListener("click", () => {
      audioElement.currentTime = Math.max(0, audioElement.currentTime - 10);
    });

    // Forward 10s
    forwardBtn.addEventListener("click", () => {
      audioElement.currentTime = Math.min(
        audioElement.duration,
        audioElement.currentTime + 10
      );
    });

    // Update time and seek bar
    audioElement.addEventListener("timeupdate", () => {
      const progress = (audioElement.currentTime / audioElement.duration) * 100;
      seekBar.value = progress;

      const minutes = Math.floor(audioElement.currentTime / 60);
      const seconds = Math.floor(audioElement.currentTime % 60);
      currentTimeDisplay.textContent = `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    });

    // Update duration
    audioElement.addEventListener("loadedmetadata", () => {
      const minutes = Math.floor(audioElement.duration / 60);
      const seconds = Math.floor(audioElement.duration % 60);
      durationDisplay.textContent = `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    });

    // Seek bar interaction
    seekBar.addEventListener("input", () => {
      const seekTo = (seekBar.value / 100) * audioElement.duration;
      audioElement.currentTime = seekTo;
    });
  });
</script> </body></html>
