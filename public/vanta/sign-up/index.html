      setTimeout(() => searchInput.focus(), 100); // Delay focus to ensure input is ready

    // Function to close the search modal
    function closeSearchModal(e) {
      if (e) {
        e.preventDefault();
        e.stopPropagation();

      document.body.style.overflow = ""; // Restore scrolling functionality
      searchInput.value = ""; // Clear search input when modal is closed
      searchResults.innerHTML = ""; // Clear search results

    // Function to display search results
    function renderResults(results) {
      // If search input is empty, clear results
      if (!searchInput.value.trim()) {

      if (results.length === 0) {

        )
        .join(""); // Convert array of HTML into a single string

      if (e.key === "Escape" && !searchModal.classList.contains("hidden")) {
        closeSearchModal();
      }
    });
  });

  const dots = document.querySelectorAll(".theme-dot");
  const savedTheme = localStorage.getItem("theme") || "default";
  function applyTheme(theme) {
    if (theme === "default") {
      document.documentElement.removeAttribute("data-theme");
      localStorage.removeItem("theme");
    } else {
      document.documentElement.setAttribute("data-theme", theme);
      localStorage.setItem("theme", theme);
    }
    // Toggle ring highlight
    dots.forEach((dot) => {
      const isActive = dot.dataset.theme === theme;
      dot.classList.toggle("ring-offset-2", isActive);
      dot.classList.toggle("ring-current", isActive);
    });
  }
  // Set theme on load
  applyTheme(savedTheme);
  // Add click listeners
  dots.forEach((dot) => {
    dot.addEventListener("click", () => {
      applyTheme(dot.dataset.theme);
    });
  });
</script> </body></html>
