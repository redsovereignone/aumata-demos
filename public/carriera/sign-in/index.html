pe":"Team"},{"title":"Maya Lombardi","subtitle":"Sports Correspondent","description":"Maya Lombardi is a sports correspondent who specializes in reporting on rising stars, fan culture, and the evolution of women's sports worldwide. With a keen eye for emerging talent and an in-depth understanding of the sports industry, she covers the most exciting developments in the world of women's athletics.\n\nPassionate about inclusivity and representation, Maya also highlights the stories of female athletes breaking barriers and challenging stereotypes. Through her reporting, she strives to shine a spotlight on the underrepresented and overlooked aspects of the sports world.\n\nMaya's work is dedicated to capturing the energy and transformation taking place in women’s sports, from grassroots initiatives to international tournaments. Her coverage is both informative and inspiring, offering fresh perspectives on the games, the athletes, and the fans.\n","meta":"","url":"/team/maya-lombardi","type":"Team"},{"title":"Marco Bianchi","subtitle":"Senior Economic Analyst","description":"Marco Bianchi is a senior economic analyst with a focus on global market trends, fiscal policy, and the future of finance. He has extensive experience in analyzing the factors that influence financial markets and the broader global economy, offering insights into market behavior and economic shifts.\n\nWith a background in economics and finance, Marco's work explores how political and economic changes affect market stability, investment strategies, and economic growth. His analysis helps readers understand complex economic topics and their real-world implications for businesses, governments, and consumers alike.\n\nMarco is dedicated to making economics accessible, breaking down complex theories and trends into easily understandable concepts. He aims to equip readers with the knowledge they need to navigate the ever-evolving landscape of global finance.\n","meta":"","url":"/team/marco-bianchi","type":   window.addEventListener("load", () => {
    // Get references to necessary DOM elements
    const searchButton = document.getElementById("searchButton");
    const searchModal = document.getElementById("searchModal");
    const modalOverlay = document.getElementById("modalOverlay");
    const searchInput = document.getElementById("searchInput");
    const searchResults = document.getElementById("searchResults");
    const closeSearch = document.getElementById("closeSearch");
    // Clear the search input field on page load to prevent old values from persisting
    searchInput.value = "";
    // Initialize Fuse.js for fuzzy searching
    const fuse = new Fuse(items, {
      keys: ["title", "subtitle", "description", "meta", "type"],
      threshold: 0.3, // Determines search sensitivity (lower = stricter match)
      includeMatches: true, // Includes matched text segments in results
    });
    // Function to open the search modal
    function openSearch(e) {
      e.preventDefault();
      e.stopPropagation();
      searchModal.classList.remove("hidden"); // Show the modal
      document.body.style.overflow = "hidden"; // Prevent scrolling in the background
      setTimeout(() => searchInput.focus(), 100); // Delay focus to ensure input is ready
    }
    // Function to close the search modal
    function closeSearchModal(e) {
      if (e) {
        e.preventDefault();
        e.stopPropagation();
      }
      searchModal.classList.add("hidden"); // Hide the modal
      document.body.style.overflow = ""; // Restore scrolling functionality
      searchInput.value = ""; // Clear search input when modal is closed
      searchResults.innerHTML = ""; // Clear search results
    }
    // Function to display search results
    function renderResults(results) {
      // If search input is empty, clear results
      if (!searchInput.value.trim()) {
        searchResults.innerHTML = "";
        return;
      }
      // If no results are found, display a message
      if (results.length === 0) {
        searchResults.innerHTML = `
                <div class="px-4 py-3 text-sm text-primary/60  ">
                    No results found
                </div>
            `;
        return;
      }
      // Generate HTML for search results and display them
      searchResults.innerHTML = results
        .slice(0, 8) // Limit results to top matches
        .map(
          (result) => `
            <a href="${result.item.url}" class="block py-4 bg-secondary group duration-300">
              <div class="flex items-center gap-2">
                <span class="text-[0.6rem] uppercase tracking-wide text-primary/80 rounded-full bg-primary/10 px-2 py-1">${result.item.type}</span>
                ${result.item.subtitle ? `<span class="text-xs text-primary/60">${result.item.subtitle}</span>` : ""}
              </div>
              <h3 class="text-base font-medium text-primary group-hover:text-accent duration-300 mt-1">
                ${result.item.title}
              </h3>
              ${result.item.meta ? `<p class="mt-1 text-xs text-primary/60">${result.item.meta}</p>` : ""}
              ${result.item.description ? `<p class="mt-1 text-sm text-primary/70">${result.item.description}</p>` : ""}
            </a>
          `
        )
        .join(""); // Convert array of HTML into a single string
    }
    // Attach event listeners for opening the search modal (both click and touch)
    searchButton.addEventListener("click", openSearch);
    searchButton.addEventListener("touchend", openSearch);
    // Attach event listeners for closing the search modal (both click and touch)
    closeSearch.addEventListener("click", closeSearchModal);
    closeSearch.addEventListener("touchend", closeSearchModal);
    // Close the modal when clicking outside the search box
    modalOverlay.addEventListener("click", closeSearchModal);
    modalOverlay.addEventListener("touchend", closeSearchModal);
    // Perform search when input changes
    searchInput.addEventListener("input", (e) => {
      const value = e.target.value; // Get the input value
      const results = value.trim() ? fuse.search(value) : []; // Perform search if input isn't empty
      renderResults(results); // Update the displayed results
    });
    // Close the search modal when pressing the "Escape" key
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && !searchModal.classList.contains("hidden")) {
        closeSearchModal();
      }
    });
  });

  const dots = Array.from(
    document.querySelectorAll('[id^="theme-dot"]')
  );
  const savedTheme = localStorage.getItem("theme") || "default";
  let transitionTimeout;
  function applyTheme(theme) {
    document.documentElement.classList.add("theme-animating");
    clearTimeout(transitionTimeout);
    transitionTimeout = window.setTimeout(() => {
      document.documentElement.classList.remove("theme-animating");
    }, 400);
    if (theme === "default") {
      document.documentElement.removeAttribute("data-theme");
      localStorage.removeItem("theme");
    } else {
      document.documentElement.setAttribute("data-theme", theme);
      localStorage.setItem("theme", theme);
    }
    // Toggle ring highlight
    dots.forEach((dot) => {
      const isActive = dot.dataset.theme === theme;
      dot.classList.toggle("ring-offset-2", isActive);
      dot.classList.toggle("ring-current", isActive);
    });
  }
  // Set theme on load
  applyTheme(savedTheme);
  // Add click listeners
  dots.forEach((dot) => {
    dot.addEventListener("click", () => {
      applyTheme(dot.dataset.theme);
    });
  });
</script> <div class="fixed bottom-4 right-4 z-50"> <div class="flex items-center gap-2"> <!-- Default theme: white base --> <button id="theme-dot-default" data-theme="default" class="ring-primary/10  size-4 rounded-full bg-[#ffffff] outline-2 transition-colors" title="Default"></button> <button id="theme-dot-accent" data-theme="accent" class=" outline-primary size-4 rounded-full bg-[#101319] outline-2 transition-colors" title="Dark"></button> <button id="theme-dot-dark" data-theme="dark" class=" outline-primary size-4 rounded-full bg-[#245230] outline-2 transition-colors" title="Dark"></button> </div> </div> </body></html>
