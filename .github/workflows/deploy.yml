name: Build & Deploy Templates

on:
  push:
    branches: [main]
  schedule:
    # Rebuild weekly (Sunday midnight UTC) to pick up template updates
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Make build script executable
        run: chmod +x build.sh

      - name: Build all templates
        run: bash build.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 5c973047237bfc626278d9ad75748ad8
          command: pages deploy public/ --project-name=aumata-demos --commit-dirty=true
